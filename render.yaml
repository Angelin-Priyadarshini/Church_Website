services:
  - type: web
    name: agstc-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
    disk:
      name: church-db
      mountPath: /data
      sizeGB: 1
